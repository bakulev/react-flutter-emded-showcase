AWSTemplateFormatVersion: "2010-09-09"
Description: React Flutter embed showcase static site on S3 and CloudFront.

Parameters:
  AssetName:
    Type: String
    Default: react-flutter-emded-showcase
  EnvironmentName:
    Type: String
    Default: demo
  SiteBucketName:
    Type: String
    Default: ""
    Description: Optional globally unique S3 bucket name. Leave blank to let CloudFormation generate one.

Conditions:
  HasSiteBucketName: !Not [!Equals [!Ref SiteBucketName, ""]]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasSiteBucketName, !Ref SiteBucketName, !Ref AWS::NoValue]
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Asset
          Value: !Ref AssetName
        - Key: Environment
          Value: !Ref EnvironmentName

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        Description: !Sub "Origin access control for ${AWS::StackName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${AssetName} ${EnvironmentName} static site"
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref SiteOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Asset
          Value: !Ref AssetName
        - Key: Environment
          Value: !Ref EnvironmentName

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
  CloudFrontDistributionId:
    Value: !Ref SiteDistribution
  CloudFrontDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  SiteUrl:
    Value: !Sub "https://${SiteDistribution.DomainName}/"
